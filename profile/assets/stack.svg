<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 470" font-family="Verdana, Geneva, 'DejaVu Sans', sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#23262f"/>
      <stop offset="1" stop-color="#14161b"/>
    </linearGradient>
  </defs>

  <rect width="1000" height="470" rx="28" fill="url(#bg)"/>

  <!-- up arrows -->
  <g stroke="#8a93a3" stroke-width="4" fill="#8a93a3">
    <line x1="500" y1="178" x2="500" y2="152"/>
    <path d="M500 142 l-7 11 14 0 z"/>
    <line x1="500" y1="318" x2="500" y2="292"/>
    <path d="M500 282 l-7 11 14 0 z"/>
  </g>

  <!-- PRODUCTS (top) -->
  <g>
    <rect x="150" y="44" width="700" height="100" rx="20" fill="#262b34" stroke="#0e1118" stroke-width="2"/>
    <rect x="174" y="68" width="52" height="52" rx="13" fill="#e0a868"/>
    <circle cx="200" cy="86" r="9" fill="#1b1d23"/>
    <path d="M184 112 a16 16 0 0 1 32 0 z" fill="#1b1d23"/>
    <text x="252" y="92" font-size="29" font-weight="700" fill="#f2f0ea">Products people use</text>
    <text x="252" y="122" font-size="18" fill="#a7adba">companions · helpers · guardians · live streams</text>
  </g>

  <!-- BRAIN (middle) -->
  <g>
    <rect x="150" y="184" width="700" height="100" rx="20" fill="#262b34" stroke="#0e1118" stroke-width="2"/>
    <rect x="174" y="208" width="52" height="52" rx="13" fill="#5fd08a"/>
    <circle cx="200" cy="234" r="13" fill="#1b1d23"/>
    <circle cx="200" cy="234" r="5" fill="#5fd08a"/>
    <text x="252" y="232" font-size="29" font-weight="700" fill="#f2f0ea">The Golem brain</text>
    <text x="252" y="262" font-size="18" fill="#a7adba">sees the world · makes decisions · takes action</text>
  </g>

  <!-- FOUNDATION (bottom) -->
  <g>
    <rect x="150" y="324" width="700" height="100" rx="20" fill="#262b34" stroke="#0e1118" stroke-width="2"/>
    <rect x="174" y="348" width="52" height="52" rx="13" fill="#7a8699"/>
    <g fill="#1b1d23">
      <rect x="184" y="358" width="14" height="14" rx="2"/>
      <rect x="202" y="358" width="14" height="14" rx="2"/>
      <rect x="184" y="376" width="14" height="14" rx="2"/>
      <rect x="202" y="376" width="14" height="14" rx="2"/>
    </g>
    <text x="252" y="372" font-size="29" font-weight="700" fill="#f2f0ea">A rock-solid foundation</text>
    <text x="252" y="402" font-size="18" fill="#a7adba">fast, reliable building blocks — each doing one job well</text>
  </g>
