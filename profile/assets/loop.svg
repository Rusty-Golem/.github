<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 390" font-family="Verdana, Geneva, 'DejaVu Sans', sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#23262f"/>
      <stop offset="1" stop-color="#14161b"/>
    </linearGradient>
    <linearGradient id="node" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#3a4150"/>
      <stop offset="1" stop-color="#262b34"/>
    </linearGradient>
    <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#8a93a3"/>
    </marker>
  </defs>

  <rect width="1000" height="390" rx="28" fill="url(#bg)"/>

  <!-- arrows between nodes -->
  <line x1="252" y1="150" x2="426" y2="150" stroke="#8a93a3" stroke-width="4" marker-end="url(#arr)"/>
  <line x1="572" y1="150" x2="746" y2="150" stroke="#8a93a3" stroke-width="4" marker-end="url(#arr)"/>
  <!-- return loop -->
  <path d="M820 216 C 820 338 180 338 180 218" fill="none" stroke="#8a93a3" stroke-width="4" marker-end="url(#arr)"/>
  <rect x="430" y="312" width="140" height="34" rx="17" fill="#191c22"/>
  <text x="500" y="335" text-anchor="middle" font-size="19" fill="#a7adba">…and repeat</text>

  <!-- SEE -->
  <g>
    <circle cx="180" cy="150" r="66" fill="url(#node)" stroke="#5fd08a" stroke-width="5"/>
    <path d="M150 150 Q180 126 210 150 Q180 174 150 150 z" fill="none" stroke="#f2f0ea" stroke-width="4"/>
    <circle cx="180" cy="150" r="9" fill="#5fd08a"/>
    <text x="180" y="262" text-anchor="middle" font-size="30" font-weight="700" fill="#f2f0ea">See</text>
    <text x="180" y="290" text-anchor="middle" font-size="17" fill="#a7adba">the world around it</text>
  </g>

  <!-- THINK -->
  <g>
    <circle cx="500" cy="150" r="66" fill="url(#node)" stroke="#e0a868" stroke-width="5"/>
    <circle cx="500" cy="144" r="19" fill="none" stroke="#f2f0ea" stroke-width="4"/>
    <line x1="491" y1="160" x2="509" y2="160" stroke="#f2f0ea" stroke-width="4" stroke-linecap="round"/>
    <line x1="493" y1="170" x2="507" y2="170" stroke="#f2f0ea" stroke-width="4" stroke-linecap="round"/>
    <line x1="500" y1="113" x2="500" y2="120" stroke="#e0a868" stroke-width="4" stroke-linecap="round"/>
    <line x1="476" y1="123" x2="481" y2="128" stroke="#e0a868" stroke-width="4" stroke-linecap="round"/>
    <line x1="524" y1="123" x2="519" y2="128" stroke="#e0a868" stroke-width="4" stroke-linecap="round"/>
    <text x="500" y="262" text-anchor="middle" font-size="30" font-weight="700" fill="#f2f0ea">Think</text>
    <text x="500" y="290" text-anchor="middle" font-size="17" fill="#a7adba">what to do next</text>
  </g>

  <!-- ACT -->
  <g>
    <circle cx="820" cy="150" r="66" fill="url(#node)" stroke="#e0795b" stroke-width="5"/>
    <rect x="796" y="124" width="48" height="15" rx="6" fill="#f2f0ea" transform="rotate(-12 820 150)"/>
    <rect x="814" y="135" width="12" height="42" rx="5" fill="#f2f0ea" transform="rotate(-12 820 150)"/>
    <text x="820" y="262" text-anchor="middle" font-size="30" font-weight="700" fill="#f2f0ea">Act</text>
    <text x="820" y="290" text-anchor="middle" font-size="17" fill="#a7adba">inside the game</text>
  </g>
</svg>
